{% extends "base.html" %} 

{% block content %}
<style>
  /* Стиль для увеличения картинки при клике (простой эффект) */
  .zoomable {
    transition: transform 0.3s ease;
    cursor: zoom-in;
  }
  .zoomable:active {
    transform: scale(1.5);
    z-index: 1000;
    position: relative;
  }
  .card-header button {
    text-decoration: none;
    color: #333;
    font-weight: bold;
    width: 100%;
    text-align: left;
  }
</style>

<h2>Документация проекта</h2>

<p>
  Здесь описан функционал интернет-магазина с UML-схемами.
</p>

<!-- Аккордеон для скрытия блоков -->
<div class="accordion" id="docAccordion">
  
  <!-- Блок 1: Основные процессы -->
  <div class="card">
    <div class="card-header" id="headingOne">
      <h2 class="mb-0">
        <button class="btn btn-link" type="button" data-toggle="collapse" data-target="#collapseOne">
          ▼ Основные процессы
        </button>
      </h2>
    </div>
    <div id="collapseOne" class="collapse show" data-parent="#docAccordion">
      <div class="card-body">
        <ul>
          <li>Управление товарами</li>
          <li>Обработка заказов</li>
          <li>Управление пользователями</li>
          <li>Интеграция с Kafka для событий и уведомлений</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Блок 2: Диаграмма классов -->
  <div class="card">
    <div class="card-header" id="headingTwo">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseTwo">
          ▼ Диаграмма классов
        </button>
      </h2>
    </div>
    <div id="collapseTwo" class="collapse" data-parent="#docAccordion">
      <div class="card-body text-center">
        <img src="{{ url_for('static', filename='uml/class_diagram.png') }}" 
             alt="Диаграмма классов" class="img-fluid border zoomable" title="Нажмите и держите для увеличения" />
      </div>
    </div>
  </div>

  <!-- Блок 3: Диаграмма последовательностей -->
  <div class="card">
    <div class="card-header" id="headingThree">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseThree">
          ▼ Диаграмма последовательностей
        </button>
      </h2>
    </div>
    <div id="collapseThree" class="collapse" data-parent="#docAccordion">
      <div class="card-body text-center">
        <img src="{{ url_for('static', filename='uml/sequence_diagram.png') }}" 
             alt="Диаграмма последовательностей" class="img-fluid border zoomable" />
      </div>
    </div>
  </div>

  <!-- Блок 4: Диаграмма прецедентов -->
  <div class="card">
    <div class="card-header" id="headingFour">
      <h2 class="mb-0">
        <button class="btn btn-link collapsed" type="button" data-toggle="collapse" data-target="#collapseFour">
          ▼ Диаграмма прецедентов (Use Case)
        </button>
      </h2>
    </div>
    <div id="collapseFour" class="collapse" data-parent="#docAccordion">
      <div class="card-body text-center">
        <img src="{{ url_for('static', filename='uml/use_case_diagram.png') }}" 
             alt="Диаграмма прецедентов" class="img-fluid border zoomable" />
      </div>
    </div>
  </div>

</div>

{% endblock %}
